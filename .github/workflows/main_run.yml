name: Create or Start Codespace

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or Start Codespace via GitHub CLI
        env:
          # Uses the PAT secret you created earlier
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
                  # 1. Find existing codespace
                  EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
        
                  if [ -z "$EXISTING_CODESPACE" ]; then
                    echo "Creating new Codespace..."
                    gh codespace create --repo ${{ github.repository }} --branch ${{ github.ref_name }}
                    # Give it a moment to provision
                    sleep 30
                    EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
                  else
                    echo "Using existing Codespace: $EXISTING_CODESPACE"
                    # Ensure it's started
                    gh codespace stop -c "$EXISTING_CODESPACE" || true
                    gh codespace view -c "$EXISTING_CODESPACE"
                  fi
        
                  # 2. Attempt to run command, Rebuild if SSH fails
                  echo "Executing command inside Codespace..."
                  if ! gh codespace ssh -c "$EXISTING_CODESPACE" -- "cd /workspaces/g2ray && ls -la"; then
                    echo "SSH failed. Attempting a rebuild to apply devcontainer features..."
                    gh codespace rebuild -c "$EXISTING_CODESPACE" --full
                    # Wait for rebuild
                    sleep 60 
                    gh codespace ssh -c "$EXISTING_CODESPACE" -- "cd /workspaces/g2ray && ls -la"
                  fi
