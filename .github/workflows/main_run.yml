name: Create or Start Codespace

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or Start Codespace via GitHub CLI
        env:
          # Uses the PAT secret you created earlier
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
                  # 1. Find existing codespace
                  EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
        
                  if [ -z "$EXISTING_CODESPACE" ]; then
                    echo "Creating new Codespace..."
                    gh codespace create --repo ${{ github.repository }} --branch ${{ github.ref_name }}
                    sleep 30
                    EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
                  else
                    echo "Using existing Codespace: $EXISTING_CODESPACE"
                    # Wake it up
                    gh codespace view -c "$EXISTING_CODESPACE" > /dev/null
                  fi
        
                  # 2. Check if SSH is working, rebuild if not
                  if ! gh codespace ssh -c "$EXISTING_CODESPACE" -- "true" 2>/dev/null; then
                    echo "SSH not available. Triggering rebuild..."
                    gh codespace rebuild -c "$EXISTING_CODESPACE" --full
                    
                    echo "Waiting for rebuild to complete (this can take 2-5 minutes)..."
                    # Retry loop: check every 30 seconds for up to 10 minutes
                    SUCCESS=false
                    for i in {1..20}; do
                      if gh codespace ssh -c "$EXISTING_CODESPACE" -- "true" 2>/dev/null; then
                        echo "Codespace is back online and SSH is ready!"
                        SUCCESS=true
                        break
                      fi
                      echo "Still rebuilding... (Attempt $i/20)"
                      sleep 30
                    done
        
                    if [ "$SUCCESS" = false ]; then
                      echo "Codespace failed to become ready in time."
                      exit 1
                    fi
                  fi
        
                  # 3. Finally, run your logic
                  echo "Running your code inside the Codespace..."
                  gh codespace ssh -c "$EXISTING_CODESPACE" -- "cd /workspaces/g2ray && ls -la && echo 'Success!'"
