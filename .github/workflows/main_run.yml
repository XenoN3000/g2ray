name: Create or Start Codespace

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or Start Codespace via GitHub CLI
        env:
          # Uses the PAT secret you created earlier
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
                  # 1. Find existing codespace
                  EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
        
                  if [ -z "$EXISTING_CODESPACE" ]; then
                    echo "Creating new Codespace..."
                    # Create and capture the name of the new codespace
                    EXISTING_CODESPACE=$(gh codespace create --repo ${{ github.repository }} --branch ${{ github.ref_name }})
                  else
                    echo "Using existing Codespace: $EXISTING_CODESPACE"
                  fi
        
                  # 2. Wait for the Codespace to be 'Available'
                  echo "Waiting for Codespace to initialize..."
                  sleep 10 
        
                  # 3. Run a command inside the Codespace via SSH
                  # Replace 'ls -la' with the command you actually want to run inside g2ray
                  echo "Executing command inside Codespace..."
                  gh codespace ssh -c "$EXISTING_CODESPACE" -- "cd /workspaces/g2ray && ls -la && echo 'Hello from inside the Codespace!'"
