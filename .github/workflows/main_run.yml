name: Create or Start Codespace

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or Start Codespace via GitHub CLI
        env:
          # Uses the PAT secret you created earlier
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
                  # 1. Find existing codespace
                  EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
        
                  if [ -z "$EXISTING_CODESPACE" ]; then
                    echo "Creating new Codespace..."
                    gh codespace create --repo ${{ github.repository }} --branch ${{ github.ref_name }}
                    sleep 30
                    EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
                  else
                    echo "Using existing Codespace: $EXISTING_CODESPACE"
                    # Wake it up
                    gh codespace view -c "$EXISTING_CODESPACE" > /dev/null
                  fi
                
                         # ... (previous logic for finding/creating codespace) ...
        
                  if ! gh codespace ssh -c "$EXISTING_CODESPACE" -- "true" 2>/dev/null; then
                    echo "SSH not available. Triggering rebuild..."
                    gh codespace rebuild -c "$EXISTING_CODESPACE" --full
                    
                    echo "Waiting for rebuild to complete (Extended Timeout: 15 mins)..."
                    SUCCESS=false
                    # Increased to 30 attempts (15 minutes total)
                    for i in {1..30}; do
                      # Try to wake it up and test SSH
                      gh codespace view -c "$EXISTING_CODESPACE" > /dev/null 2>&1
                      if gh codespace ssh -c "$EXISTING_CODESPACE" -- "true" 2>/dev/null; then
                        echo "Codespace is online and SSH is ready!"
                        SUCCESS=true
                        break
                      fi
                      echo "Still waiting for rebuild/start... (Attempt $i/30)"
                      sleep 30
                    done
        
                    if [ "$SUCCESS" = false ]; then
                      echo "Codespace failed to become ready. Check manual rebuild status at https://github.com/codespaces"
                      exit 1
                    fi
                  fi
        
                  # 3. Finally, run your logic
                  echo "Running your code inside the Codespace..."
                  gh codespace ssh -c "$EXISTING_CODESPACE" -- "cd /workspaces/g2ray && ls -la"
