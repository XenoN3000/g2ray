name: Create or Start Codespace

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or Start Codespace via GitHub CLI
        env:
          # Uses the PAT secret you created earlier
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
                echo "Checking for existing Codespaces for ${{ github.repository }}..."
                
                # Fetches the name of the first existing Codespace for this repository
                EXISTING_CODESPACE=$(gh codespace list --repo ${{ github.repository }} --json name --jq '.[0].name')
                
                if [ -z "$EXISTING_CODESPACE" ]; then
                  echo "No existing Codespace found. Creating a new one..."
                  gh codespace create --repo ${{ github.repository }} --branch ${{ github.ref_name }}
                else
                  echo "Found existing Codespace: $EXISTING_CODESPACE"
                  echo "Ensuring the Codespace is started..."
                  
                  # Using 'view' with the codespace name will trigger it to start if it's currently shut down
                  gh codespace view -c "$EXISTING_CODESPACE"
                  
                  echo "Codespace $EXISTING_CODESPACE is ready!"
                fi
